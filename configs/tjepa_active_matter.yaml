defaults:
  - _self_

# -------- Top-level knobs (mirrors le-wm/config/train/lewm.yaml hyperparams) --
seed: 3072
num_workers: 6
img_size: 256
patch_size: 16
encoder_scale: tiny      # vit_hf size: hidden_dim 192 for 'tiny'
in_chans: 11

wm:
  history_size: 3
  num_preds: 1
  embed_dim: 192
  # nsteps>1 enables a sliding-window AR rollout (le-wm/jepa.py:61-110 spirit).
  # Constraint: nsteps + history_size <= num_frames so the target window stays in-bounds.
  nsteps: 1

predictor:
  depth: 6
  heads: 6
  mlp_dim: 2048
  dim_head: 32
  dropout: 0.1
  emb_dropout: 0.0
  unconditional: false

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

# -------- Data ---------------------------------------------------------------
# Invariant: data.num_frames == wm.history_size + wm.num_preds (LeWM convention).
# With history_size=3, num_preds=1, num_frames must be 4. tjepa_forward asserts this.
data:
  root: ${oc.env:THE_WELL_DATA_DIR}/active_matter/data
  num_frames: 4
  bins_per_param: 4
  stats_path: cache/active_matter_stats.npz

loader:
  batch_size: 16
  num_workers: ${num_workers}
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true

# -------- Optimization (LeWM defaults) ---------------------------------------
optimizer:
  type: AdamW
  lr: 5.0e-5
  weight_decay: 1.0e-3

scheduler:
  type: LinearWarmupCosineAnnealingLR

trainer:
  max_epochs: 200
  devices: auto
  accelerator: gpu
  precision: bf16-mixed
  gradient_clip_val: 1.0

# -------- Probes (instantiated in train.py from this config) ------------------
probes:
  knn:
    enabled: true
    queue_length: 20000
    k: 10
  linear:
    enabled: true
  regression:
    enabled: true
    targets: [alpha, zeta]

# -------- W&B ----------------------------------------------------------------
wandb:
  enabled: true
  config:
    entity: "al6956-new-york-university"
    project: tjepa-active-matter
    name: tjepa-am
    log_model: true

# -------- Checkpointing ------------------------------------------------------
# Two tracks: periodic keeps the full epoch trajectory for post-hoc analysis;
# best keeps top-K by probe metric for downstream finetuning. Both auto-upload
# as W&B Artifacts when `wandb.config.log_model=true`.
checkpoint:
  # `${now:...}` makes each run unique so re-runs don't overwrite prior ckpts.
  # Resolved against the original CWD via `hydra.utils.to_absolute_path` in
  # train.py, so it lands at <project_root>/checkpoints/<name>/<timestamp>/
  # regardless of Hydra's per-run CWD switch.
  dirpath: checkpoints/${wandb.config.name}/${now:%Y%m%d_%H%M%S}
  periodic:
    every_n_epochs: 10
    save_top_k: -1
    save_last: true
    filename: "epoch{epoch:03d}"
  best:
    # train.py validates that this metric belongs to an enabled probe at
    # startup. Switch to `eval/regprobe_mse_alpha` (mode=min) or
    # `eval/regprobe_r2` (mode=max) when KNN is disabled.
    monitor: eval/knn_probe_acc
    mode: max
    save_top_k: 3
    filename: "best-{epoch:03d}"
    auto_insert_metric_name: false

# -------- Test-time evaluation (consumed by test.py) -------------------------
test:
  # If null, test.py auto-discovers the freshest .ckpt under ${checkpoint.dirpath}/best/.
  # Set explicitly to evaluate a specific file.
  checkpoint_path: null
  # Suffix appended to wandb.config.name so test runs don't clobber the train run.
  wandb_run_suffix: "-test"
